<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>S&P 500 — YTD Best & Worst Performers</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-terminal:#0E1117;--bg-panel:#161A22;--bg-header:#1F242F;--bg-row-label:#161A22;
    --border-section:#30363D;--border-subtle:#21262D;
    --text-bright:#F0F3F6;--text-secondary:#C9D1D9;--text-header:#8B949E;--text-muted:#6E7681;--text-dim:#484F58;
    --green-strong:#10B981;--green-mid:#047857;--green-subtle:#064E3B;
    --red-strong:#F43F5E;--red-mid:#BE123C;--red-subtle:#4C0519;
    --neutral:#2D333B;--accent-blue:#58A6FF;--gold:#F0B429;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:var(--bg-terminal)}
  ::-webkit-scrollbar-thumb{background:var(--border-section);border-radius:4px}
  *{scrollbar-width:thin;scrollbar-color:var(--border-section) var(--bg-terminal)}

  body{
    background:var(--bg-terminal);color:var(--text-bright);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5;
  }

  .dashboard-header,.controls,.content,.footer{
    padding-left:max(28px,calc((100vw - 1384px)/2));
    padding-right:max(28px,calc((100vw - 1384px)/2));
  }

  /* Header */
  .dashboard-header{
    background:var(--bg-panel);border-bottom:1px solid var(--border-subtle);
    padding-top:18px;padding-bottom:16px;display:flex;justify-content:space-between;
    align-items:flex-end;flex-wrap:wrap;gap:12px;
  }
  .header-left{display:flex;flex-direction:column;gap:3px}
  .header-tag{
    font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;letter-spacing:.5px;
    background:linear-gradient(110deg,var(--text-secondary) 0%,#FFF 20%,var(--text-secondary) 40%,var(--text-secondary) 100%);
    background-size:200% auto;color:transparent;-webkit-background-clip:text;background-clip:text;
    animation:shimmer 3.5s linear infinite;
  }
  @keyframes shimmer{to{background-position:-200% center}}
  .header-sub{font-size:12px;color:var(--text-muted)}
  .header-right{display:flex;align-items:center;gap:14px}
  .header-right .meta{font-size:11px;color:var(--text-muted);text-align:right;line-height:1.6}
  .header-right .meta span{color:var(--text-secondary)}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--green-strong);display:inline-block;box-shadow:0 0 6px rgba(16,185,129,.5);animation:pulse 2.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* Controls */
  .controls{padding-top:12px;padding-bottom:12px;display:flex;gap:4px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border-subtle);background:var(--bg-terminal)}
  .tab-btn{border:none;background:transparent;color:var(--text-header);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:7px 16px;border-radius:6px;cursor:pointer;transition:all .15s ease}
  .tab-btn:hover{background:rgba(255,255,255,.04);color:var(--text-secondary)}
  .tab-btn.active{background:var(--border-section);color:var(--text-bright);font-weight:600}
  .controls .sep{width:1px;height:20px;background:var(--border-section);margin:0 8px}
  .stat-pill{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;margin-left:auto}
  .stat-pill.green{background:var(--green-subtle);color:var(--green-strong)}
  .stat-pill.red{background:var(--red-subtle);color:var(--red-strong)}

  /* Content */
  .content{padding-top:20px;padding-bottom:40px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  .panel{display:none;background:var(--bg-panel);border:1px solid var(--border-section);border-radius:10px;margin-bottom:20px;box-shadow:0 4px 12px -2px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.2);overflow:hidden}
  .panel.active{display:block;animation:fadeIn .25s ease-out forwards}

  .panel-header{display:flex;align-items:center;gap:10px;padding:16px 20px 14px;border-bottom:1px solid var(--border-section)}
  .panel-header .title{font-size:18px;font-weight:800;letter-spacing:-.3px}
  .panel-header .badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:4px;border:1px solid var(--border-section)}
  .panel-header .title.green{color:var(--green-strong)}
  .panel-header .title.red{color:var(--red-strong)}

  /* Table */
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:separate;border-spacing:0 1px;background:var(--bg-terminal);font-size:14px}
  thead th{background:var(--bg-header);color:var(--text-header);font-family:'Inter',sans-serif;font-weight:600;font-size:11px;padding:10px 12px;text-align:left;position:sticky;top:0;z-index:2;box-shadow:0 1px 0 var(--border-subtle);text-transform:uppercase;letter-spacing:.5px}
  thead th:last-child{text-align:right}
  thead th.center{text-align:center}

  tbody td{padding:12px 12px;font-weight:500;background:var(--bg-panel);transition:filter .1s ease}
  tbody tr:hover td{filter:brightness(1.15)}

  /* Rank cell */
  .rank{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:15px;width:40px;text-align:center}
  .rank.top3{font-size:17px}

  /* Ticker */
  .ticker{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:var(--accent-blue);white-space:nowrap;width:70px}

  /* Company name */
  .company{color:var(--text-secondary);font-size:13px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* Sector */
  .sector{color:var(--text-muted);font-size:11px;white-space:nowrap}

  /* Price */
  .price{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;color:var(--text-secondary);text-align:right;width:80px;white-space:nowrap}

  /* YTD cell */
  .ytd-cell{text-align:right;width:200px}
  .ytd-value{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;display:inline-block;min-width:70px;text-align:right}
  .ytd-bar-wrap{display:inline-block;width:100px;height:14px;background:var(--neutral);border-radius:3px;vertical-align:middle;margin-left:8px;overflow:hidden;position:relative}
  .ytd-bar{height:100%;border-radius:3px;transition:width .6s ease-out}
  .ytd-bar.green{background:linear-gradient(90deg,var(--green-mid),var(--green-strong))}
  .ytd-bar.red{background:linear-gradient(270deg,var(--red-mid),var(--red-strong))}

  /* Footer */
  .footer{padding-top:14px;padding-bottom:14px;border-top:1px solid var(--border-subtle);font-size:11px;color:var(--text-dim);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

  /* Loading */
  .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
  .spinner{width:26px;height:26px;border:2px solid var(--border-section);border-top-color:var(--accent-blue);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-state .msg{font-size:12px;color:var(--text-muted)}
  .error-state{padding:40px;text-align:center;color:var(--red-strong);font-size:13px}

  @media(max-width:768px){
    .dashboard-header,.controls,.content,.footer{padding-left:14px;padding-right:14px}
    .company{max-width:150px}
    .ytd-bar-wrap{width:60px}
    table{font-size:12px}
    tbody td{padding:10px 8px}
  }
</style>
</head>
<body>

<header class="dashboard-header">
  <div class="header-left">
    <div class="header-tag">S&amp;P 500 — YTD PERFORMERS</div>
    <div class="header-sub">Best &amp; Worst <span id="yearLabel"></span> Year-to-Date Returns</div>
  </div>
  <div class="header-right">
    <div class="meta">
      <div>Source: <span>Yahoo Finance (Adj Close)</span></div>
      <div>Updated: <span id="updatedAt">—</span></div>
      <div>Stocks fetched: <span id="stockCount">—</span></div>
    </div>
    <span class="status-dot" title="Live"></span>
  </div>
</header>

<nav class="controls">
  <button class="tab-btn active" data-tab="winners">🏆 Top 20</button>
  <button class="tab-btn" data-tab="losers">📉 Bottom 20</button>
  <div class="sep"></div>
  <button class="tab-btn" data-tab="both">Side by Side</button>
  <div class="sep"></div>
  <button class="tab-btn" id="btn-export" style="margin-left:auto;color:var(--accent-blue)">↓ Export CSV</button>
</nav>

<main class="content" id="content">
  <div class="loading-state" id="loader">
    <div class="spinner"></div>
    <div class="msg">Fetching YTD returns for ~500 S&amp;P 500 stocks…</div>
  </div>
</main>

<footer class="footer">
  <span>S&amp;P 500 constituents · YTD = (Current Price / Dec 31 Close − 1) × 100</span>
  <span>Auto-refreshes hourly via Vercel Edge Cache</span>
</footer>

<script>
const API_PATH = null;
const EMBEDDED_DATA = {"ok": true, "totalFetched": 501, "totalConstituents": 503, "count": 20, "winners": [{"symbol": "SNDK", "name": "Sandisk", "price": 1447.23, "ytd": 509.67, "sector": "Information Technology"}, {"symbol": "INTC", "name": "Intel", "price": 120.29, "ytd": 225.99, "sector": "Information Technology"}, {"symbol": "STX", "name": "Seagate Technology Holdings", "price": 817.35, "ytd": 196.8, "sector": "Information Technology"}, {"symbol": "WDC", "name": "Western Digital", "price": 494.09, "ytd": 186.81, "sector": "Information Technology"}, {"symbol": "MU", "name": "Micron Technology", "price": 803.63, "ytd": 181.57, "sector": "Information Technology"}, {"symbol": "LITE", "name": "Lumentum Holdings", "price": 1030.37, "ytd": 179.54, "sector": "Information Technology"}, {"symbol": "CIEN", "name": "Ciena", "price": 577.9, "ytd": 147.1, "sector": "Information Technology"}, {"symbol": "GLW", "name": "Corning", "price": 206.51, "ytd": 135.85, "sector": "Information Technology"}, {"symbol": "VRT", "name": "Vertiv Holdings, LLC", "price": 369.99, "ytd": 128.37, "sector": "Industrials"}, {"symbol": "COHR", "name": "Coherent", "price": 403.71, "ytd": 118.73, "sector": "Information Technology"}, {"symbol": "FIX", "name": "Comfort Systems USA", "price": 2034.63, "ytd": 118.01, "sector": "Industrials"}, {"symbol": "ON", "name": "ON Semiconductor", "price": 115.71, "ytd": 113.68, "sector": "Information Technology"}, {"symbol": "AMD", "name": "Advanced Micro Devices", "price": 445.5, "ytd": 108.02, "sector": "Information Technology"}, {"symbol": "Q", "name": "Qnity Electronics", "price": 162.02, "ytd": 98.43, "sector": "Information Technology"}, {"symbol": "GNRC", "name": "Generac Holdlings", "price": 267.25, "ytd": 95.97, "sector": "Industrials"}, {"symbol": "DELL", "name": "Dell Technologies", "price": 243.87, "ytd": 93.73, "sector": "Information Technology"}, {"symbol": "TER", "name": "Teradyne", "price": 363.38, "ytd": 87.74, "sector": "Information Technology"}, {"symbol": "AKAM", "name": "Akamai Technologies", "price": 161.14, "ytd": 84.69, "sector": "Information Technology"}, {"symbol": "PWR", "name": "Quanta Services", "price": 773.72, "ytd": 83.32, "sector": "Industrials"}, {"symbol": "MPWR", "name": "Monolithic Power Systems", "price": 1650.35, "ytd": 82.09, "sector": "Information Technology"}], "losers": [{"symbol": "EPAM", "name": "EPAM Systems", "price": 90.39, "ytd": -55.88, "sector": "Information Technology"}, {"symbol": "CSGP", "name": "CoStar Group", "price": 31.97, "ytd": -52.45, "sector": "Real Estate"}, {"symbol": "PODD", "name": "Insulet", "price": 148.84, "ytd": -47.64, "sector": "Health Care"}, {"symbol": "TTD", "name": "The Trade Desk", "price": 20.49, "ytd": -46.02, "sector": "Communication Services"}, {"symbol": "WDAY", "name": "Workday", "price": 116.5, "ytd": -45.76, "sector": "Information Technology"}, {"symbol": "CTSH", "name": "Cognizant Technology Solutions", "price": 45.97, "ytd": -44.61, "sector": "Information Technology"}, {"symbol": "BSX", "name": "Boston Scientific", "price": 53.06, "ytd": -44.35, "sector": "Health Care"}, {"symbol": "INTU", "name": "Intuit", "price": 371.71, "ytd": -43.89, "sector": "Information Technology"}, {"symbol": "NOW", "name": "ServiceNow", "price": 87.05, "ytd": -43.18, "sector": "Information Technology"}, {"symbol": "IT", "name": "Gartner", "price": 144.46, "ytd": -42.74, "sector": "Information Technology"}, {"symbol": "LULU", "name": "lululemon athletica", "price": 121.21, "ytd": -41.67, "sector": "Consumer Discretionary"}, {"symbol": "ZTS", "name": "Zoetis", "price": 74.34, "ytd": -40.92, "sector": "Health Care"}, {"symbol": "ACN", "name": "Accenture", "price": 159.64, "ytd": -40.5, "sector": "Information Technology"}, {"symbol": "TSCO", "name": "Tractor Supply", "price": 29.85, "ytd": -40.31, "sector": "Consumer Discretionary"}, {"symbol": "CRM", "name": "Salesforce", "price": 165.84, "ytd": -37.4, "sector": "Information Technology"}, {"symbol": "FICO", "name": "Fair Isaac", "price": 1064.64, "ytd": -37.03, "sector": "Information Technology"}, {"symbol": "FIS", "name": "Fidelity National Information S", "price": 42.6, "ytd": -35.9, "sector": "Financials"}, {"symbol": "BR", "name": "Broadridge Financial Solutions,", "price": 143.93, "ytd": -35.51, "sector": "Industrials"}, {"symbol": "TYL", "name": "Tyler Technologies", "price": 298.59, "ytd": -34.22, "sector": "Information Technology"}, {"symbol": "DASH", "name": "DoorDash", "price": 149.07, "ytd": -34.18, "sector": "Consumer Discretionary"}], "updatedAt": "2026-05-13T23:12:34.047Z", "year": 2026};
const STATIC_PATH = null;

function buildTable(stocks, type) {
  const isWinner = type === "winners";
  const maxAbs = Math.max(...stocks.map(s => Math.abs(s.ytd)), 1);

  let html = `<div class="panel-header">
    <span class="title ${isWinner ? 'green' : 'red'}">${isWinner ? '🏆 Top 20 Winners' : '📉 Bottom 20 Losers'}</span>
    <span class="badge">${new Date().getFullYear()} YTD</span>
  </div><div class="table-scroll"><table><thead><tr>
    <th class="center">#</th><th>Ticker</th><th>Company</th><th>Sector</th><th style="text-align:right">Price</th><th style="text-align:right">YTD Return</th>
  </tr></thead><tbody>`;

  stocks.forEach((s, i) => {
    const rank = i + 1;
    const color = s.ytd >= 0 ? "green" : "red";
    const barW = Math.min(Math.abs(s.ytd) / maxAbs * 100, 100);
    const sign = s.ytd >= 0 ? "+" : "";
    const rankClass = rank <= 3 ? " top3" : "";
    const rankColor = isWinner
      ? (rank === 1 ? "var(--gold)" : rank === 2 ? "#C0C0C0" : rank === 3 ? "#CD7F32" : "var(--text-muted)")
      : "var(--text-muted)";

    html += `<tr>
      <td class="rank${rankClass}" style="color:${rankColor}">${rank}</td>
      <td class="ticker">${s.symbol}</td>
      <td class="company">${s.name}</td>
      <td class="sector">${s.sector || ''}</td>
      <td class="price">$${s.price.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
      <td class="ytd-cell">
        <span class="ytd-value" style="color:var(--${color}-strong)">${sign}${s.ytd.toFixed(1)}%</span>
        <span class="ytd-bar-wrap"><span class="ytd-bar ${color}" style="width:${barW}%"></span></span>
      </td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  return html;
}

function initTabs() {
  document.querySelectorAll(".tab-btn[data-tab]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn[data-tab]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      const tab = btn.dataset.tab;
      if (tab === "both") {
        document.getElementById("panel-winners")?.classList.add("active");
        document.getElementById("panel-losers")?.classList.add("active");
      } else {
        document.getElementById("panel-" + tab)?.classList.add("active");
      }
    });
  });
}

async function main() {
  const content = document.getElementById("content");
  const loader = document.getElementById("loader");

  try {
    const json = EMBEDDED_DATA;

    const { winners, losers, updatedAt, year, totalFetched } = json;
    document.getElementById("updatedAt").textContent =
      new Date(updatedAt).toLocaleString("en-GB", { day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit", hour12:false });
    document.getElementById("yearLabel").textContent = year;
    document.getElementById("stockCount").textContent = totalFetched + " / " + (json.totalConstituents || totalFetched);

    loader.remove();

    const pWin = document.createElement("div");
    pWin.id = "panel-winners"; pWin.className = "panel active";
    pWin.innerHTML = buildTable(winners, "winners");
    content.appendChild(pWin);

    const pLose = document.createElement("div");
    pLose.id = "panel-losers"; pLose.className = "panel";
    pLose.innerHTML = buildTable(losers, "losers");
    content.appendChild(pLose);

    initTabs();
  } catch (err) {
    loader.innerHTML = `<div class="error-state"><div style="font-size:16px;margin-bottom:8px">⚠</div><div>${err.message}</div></div>`;
  }
}

// CSV Export
document.getElementById("btn-export")?.addEventListener("click", () => {
  const activeTable = document.querySelector(".panel.active table");
  if (!activeTable) return alert("Select a tab first.");
  const csv = [];
  activeTable.querySelectorAll("tr").forEach(row => {
    const rd = [];
    row.querySelectorAll("th, td").forEach(col => rd.push('"' + col.innerText.replace(/"/g,'""').trim() + '"'));
    csv.push(rd.join(","));
  });
  const blob = new Blob([csv.join("\n")], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "sp500_performers.csv"; a.click();
  URL.revokeObjectURL(url);
});

main();
</script>
</body>
</html>
